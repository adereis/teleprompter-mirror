<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>View — Window Mirror</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  video { width: 100vw; height: 100vh; object-fit: contain; display: none; transform: scaleX(-1) translateZ(0); }
  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #666; font-family: system-ui, sans-serif; font-size: 1.4em;
    text-align: center; padding: 2em;
  }
  #overlay.hidden { display: none; }
</style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">Waiting for cast…</div>
<script>
const overlay = document.getElementById('overlay');
const video = document.getElementById('video');
let pc = null;

async function waitForIce(conn) {
  if (conn.iceGatheringState === 'complete') return;
  return new Promise(resolve => {
    const t = setTimeout(resolve, 5000);
    conn.onicegatheringstatechange = () => {
      if (conn.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
    };
  });
}

async function connect() {
  let offer = null;
  while (!offer) {
    try {
      const res = await fetch('/offer');
      if (res.ok && res.status === 200) offer = await res.json();
    } catch (e) {}
    if (!offer) await new Promise(r => setTimeout(r, 500));
  }

  overlay.textContent = 'Connecting…';

  pc = new RTCPeerConnection({
    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
  });

  pc.ontrack = (e) => {
    video.srcObject = e.streams[0];
    video.style.display = 'block';
    overlay.classList.add('hidden');
    // Minimize jitter buffer — USB tethering has near-zero jitter
    const recv = pc.getReceivers().find(r => r.track?.kind === 'video');
    if (recv && recv.jitterBufferTarget !== undefined) recv.jitterBufferTarget = 0;
  };


  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if (s === 'disconnected' || s === 'failed') {
      overlay.textContent = 'Reconnecting…';
      overlay.classList.remove('hidden');
      video.style.display = 'none';
      if (pc) pc.close();
      pc = null;
      setTimeout(connect, 1000);
    }
  };

  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitForIce(pc);

  await fetch('/answer', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(pc.localDescription)
  });
}

connect();

// Keep tablet screen on while viewing
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      let lock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') lock = await navigator.wakeLock.request('screen');
      });
    }
  } catch (_) {}
}
keepAwake();

document.body.addEventListener('click', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(() => {});
  else
    document.exitFullscreen();
});
</script>
</body>
</html>
