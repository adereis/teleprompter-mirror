<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Teleprompter Mirror</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  video { width: 100vw; height: 100vh; object-fit: contain; display: none; transform: scaleX(-1) translateZ(0); }
  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #444; font-family: system-ui, sans-serif; font-size: 1.4em;
    text-align: center; padding: 2em;
  }
  #overlay.hidden { display: none; }
  #jitter {
    position: fixed; top: 8px; right: 8px;
    font: 40px/1 monospace; padding: 6px 14px;
    border-radius: 4px; background: rgba(0,0,0,0.5);
    color: #4ecca3; z-index: 10; display: none;
    transform: scaleX(-1);
  }
  #overlay span {
    animation: drift-x 23s ease-in-out infinite alternate,
               drift-y 17s ease-in-out infinite alternate;
  }
  @keyframes drift-x { from { transform: translateX(-20vw); } to { transform: translateX(20vw); } }
  @keyframes drift-y { from { transform: translateY(-15vh); } to { transform: translateY(15vh); } }
</style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="jitter"></div>
  <div id="overlay"><span>Waiting for cast…</span></div>
<script>
const overlay = document.getElementById('overlay');
const video = document.getElementById('video');
let pc = null;

async function waitForIce(conn) {
  if (conn.iceGatheringState === 'complete') return;
  return new Promise(resolve => {
    const t = setTimeout(resolve, 5000);
    conn.onicegatheringstatechange = () => {
      if (conn.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
    };
  });
}

function sendViewport(ch) {
  if (ch.readyState !== 'open') return;
  ch.send(JSON.stringify({viewport: {
    w: window.innerWidth, h: window.innerHeight,
    fullscreen: !!document.fullscreenElement
  }}));
}

async function connect() {
  let offer = null;
  while (!offer) {
    try {
      const res = await fetch('/offer');
      if (res.ok && res.status === 200) offer = await res.json();
    } catch (e) {}
    if (!offer) await new Promise(r => setTimeout(r, 500));
  }

  overlay.querySelector('span').textContent = 'Connecting…';

  pc = new RTCPeerConnection({
    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
  });

  pc.ontrack = (e) => {
    video.srcObject = e.streams[0];
    video.style.display = 'block';
    overlay.classList.add('hidden');
    // Minimize jitter buffer — USB tethering has near-zero jitter
    const recv = pc.getReceivers().find(r => r.track?.kind === 'video');
    if (recv && recv.jitterBufferTarget !== undefined) recv.jitterBufferTarget = 0;
  };


  pc.ondatachannel = (e) => {
    const ch = e.channel;
    ch.onopen = () => sendViewport(ch);
    window.addEventListener('resize', () => sendViewport(ch));
    document.addEventListener('fullscreenchange', () => sendViewport(ch));
  };

  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    if (s === 'disconnected' || s === 'failed') {
      overlay.querySelector('span').textContent = 'Waiting for cast…';
      overlay.classList.remove('hidden');
      video.style.display = 'none';
      if (pc) pc.close();
      pc = null;
      setTimeout(connect, 1000);
    }
  };

  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitForIce(pc);

  await fetch('/answer', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(pc.localDescription)
  });
}

connect();

// Keep tablet screen on while viewing
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      let lock = await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') lock = await navigator.wakeLock.request('screen');
      });
    }
  } catch (_) {}
}
keepAwake();

// Jitter buffer depth monitor (sliding window over last 2s)
let prevJB = null;
setInterval(async () => {
  const el = document.getElementById('jitter');
  if (!pc || pc.connectionState !== 'connected') {
    el.style.display = 'none';
    prevJB = null;
    return;
  }
  const report = await pc.getStats();
  report.forEach(s => {
    if (s.type !== 'inbound-rtp' || s.kind !== 'video') return;
    const d = s.jitterBufferDelay, c = s.jitterBufferEmittedCount;
    if (d == null || c == null) return;
    if (prevJB && c > prevJB.c) {
      const ms = ((d - prevJB.d) / (c - prevJB.c) * 1000).toFixed(0);
      el.style.display = 'block';
      el.textContent = `${ms}ms`;
      el.style.color = ms < 80 ? '#4ecca3' : ms < 200 ? '#f0a500' : '#e74c3c';
    }
    prevJB = { d, c };
  });
}, 2000);

document.body.addEventListener('click', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(() => {});
  else
    document.exitFullscreen();
});
</script>
</body>
</html>
