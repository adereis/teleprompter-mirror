<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cast Region — Window Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 1em; }
  h1 { color: #fff; font-size: 1.3em; display: inline; }
  .bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 0.8em; }
  button {
    padding: 8px 16px; font-size: 14px; cursor: pointer;
    background: #0f3460; color: #fff; border: none; border-radius: 6px;
  }
  button:hover { background: #1a4a8a; }
  button:disabled { opacity: 0.4; cursor: default; }
  #info { color: #888; font-size: 13px; }
  #status { font-size: 13px; }
  .ok { color: #4ecca3; } .wait { color: #f0a500; } .err { color: #e74c3c; }
  #preview {
    cursor: crosshair; border-radius: 4px; display: none;
    max-width: 100%; background: #000;
  }
  #output { display: none; }
  #source { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
</style>
</head>
<body>
  <div class="bar">
    <h1>Cast Region</h1>
    <button id="captureBtn" onclick="startCapture()">Share Screen</button>
    <button id="streamBtn" onclick="startStream()" disabled>Stream to Tablet</button>
    <button id="stopBtn" onclick="stopAll()" disabled>Stop</button>
    <button id="resetCropBtn" onclick="resetCrop()" style="display:none">Reset Crop</button>
    <span id="info"></span>
  </div>
  <div id="status"></div>
  <canvas id="preview"></canvas>
  <canvas id="output"></canvas>
  <video id="source" autoplay muted playsinline></video>
<script>
const preview = document.getElementById('preview');
const output  = document.getElementById('output');
const source  = document.getElementById('source');
const pctx = preview.getContext('2d');
const octx = output.getContext('2d');

let rawStream = null, pc = null, animId = null;
let crop = null;   // {x,y,w,h} in video-pixel coords
let scale = 1;     // preview pixels per video pixel
let dragging = false, dragStart = null;

function status(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls || '';
}
function info(msg) { document.getElementById('info').textContent = msg; }

// --- Phase 1: capture screen ---

async function startCapture() {
  try {
    status('Select a screen or window to share...', 'wait');
    rawStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always', frameRate: { ideal: 60, max: 60 } },
      audio: false
    });
    source.srcObject = rawStream;
    await source.play();
    await new Promise(r => {
      if (source.videoWidth > 0) return r();
      source.onloadedmetadata = r;
    });
    // Wait for first actual frame
    await new Promise(r => {
      if ('requestVideoFrameCallback' in source) source.requestVideoFrameCallback(r);
      else setTimeout(r, 200);
    });

    const vw = source.videoWidth, vh = source.videoHeight;
    crop = { x: 0, y: 0, w: vw, h: vh };

    // Scale preview to fit viewport
    const maxW = Math.min(window.innerWidth - 40, 1200);
    const maxH = window.innerHeight - 120;
    scale = Math.min(maxW / vw, maxH / vh, 1);
    preview.width  = Math.round(vw * scale);
    preview.height = Math.round(vh * scale);
    preview.style.display = 'block';

    rawStream.getVideoTracks()[0].onended = () => stopAll();

    document.getElementById('captureBtn').disabled = true;
    document.getElementById('streamBtn').disabled = false;
    document.getElementById('resetCropBtn').style.display = '';

    status('Draw a rectangle to crop, or click Stream to send the full capture.', '');
    info(`Source: ${vw}x${vh}`);
    renderPreview();
  } catch (e) {
    if (e.name === 'NotAllowedError') status('Cancelled.', '');
    else { status('Error: ' + e.message, 'err'); console.error(e); }
  }
}

// --- Preview with crop overlay ---

function renderPreview() {
  const vw = source.videoWidth, vh = source.videoHeight;
  pctx.drawImage(source, 0, 0, preview.width, preview.height);

  // Dim outside crop
  pctx.fillStyle = 'rgba(0,0,0,0.45)';
  const cx = crop.x * scale, cy = crop.y * scale;
  const cw = crop.w * scale, ch = crop.h * scale;
  pctx.fillRect(0, 0, preview.width, cy);
  pctx.fillRect(0, cy + ch, preview.width, preview.height - cy - ch);
  pctx.fillRect(0, cy, cx, ch);
  pctx.fillRect(cx + cw, cy, preview.width - cx - cw, ch);

  // Crop border
  pctx.strokeStyle = '#4ecca3';
  pctx.lineWidth = 2;
  pctx.setLineDash([6, 3]);
  pctx.strokeRect(cx, cy, cw, ch);
  pctx.setLineDash([]);

  // Crop label
  pctx.fillStyle = '#4ecca3';
  pctx.font = '12px system-ui';
  pctx.fillText(`${crop.w}x${crop.h} @ (${crop.x},${crop.y})`, cx + 4, cy - 5);

  animId = requestAnimationFrame(renderPreview);
}

// --- Mouse crop selection ---

function canvasToVideo(e) {
  const r = preview.getBoundingClientRect();
  return {
    x: Math.round(Math.max(0, Math.min(source.videoWidth,  (e.clientX - r.left) / scale))),
    y: Math.round(Math.max(0, Math.min(source.videoHeight, (e.clientY - r.top)  / scale)))
  };
}

preview.addEventListener('mousedown', e => {
  dragStart = canvasToVideo(e);
  dragging = true;
});
preview.addEventListener('mousemove', e => {
  if (!dragging) return;
  const p = canvasToVideo(e);
  crop = {
    x: Math.min(dragStart.x, p.x), y: Math.min(dragStart.y, p.y),
    w: Math.abs(p.x - dragStart.x), h: Math.abs(p.y - dragStart.y)
  };
});
preview.addEventListener('mouseup', () => {
  dragging = false;
  if (crop.w < 16 || crop.h < 16) resetCrop();
  else info(`Crop: ${crop.w}x${crop.h} @ (${crop.x},${crop.y})`);
});

function resetCrop() {
  crop = { x: 0, y: 0, w: source.videoWidth, h: source.videoHeight };
  info(`Source: ${source.videoWidth}x${source.videoHeight} (full)`);
}

// --- Phase 2: stream cropped region via WebRTC ---

async function startStream() {
  try {
    await fetch('/reset', { method: 'POST' });

    // Render crop synced to decoded video frames, not rAF
    output.width  = crop.w;
    output.height = crop.h;
    const cx = crop.x, cy = crop.y, cw = crop.w, ch = crop.h;

    function renderCrop() {
      octx.drawImage(source, cx, cy, cw, ch, 0, 0, cw, ch);
      source.requestVideoFrameCallback(renderCrop);
    }
    source.requestVideoFrameCallback(renderCrop);

    const croppedStream = output.captureStream(60);
    const vtrack = croppedStream.getVideoTracks()[0];
    vtrack.contentHint = 'motion';

    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });
    croppedStream.getTracks().forEach(t => pc.addTrack(t, croppedStream));

    // Prefer VP8
    const txc = pc.getTransceivers()[0];
    if (txc && txc.setCodecPreferences) {
      const caps = RTCRtpSender.getCapabilities('video');
      if (caps) {
        const vp8 = caps.codecs.filter(c => c.mimeType === 'video/VP8');
        const rest = caps.codecs.filter(c => c.mimeType !== 'video/VP8');
        if (vp8.length) txc.setCodecPreferences([...vp8, ...rest]);
      }
    }

    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) {
      const params = sender.getParameters();
      if (params.encodings?.[0]) {
        params.encodings[0].maxBitrate = 8_000_000;
        params.encodings[0].maxFramerate = 60;
        params.degradationPreference = 'maintain-resolution';
        await sender.setParameters(params);
      }
    }

    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      if (s === 'connected') status(`Connected — streaming ${crop.w}x${crop.h} to tablet`, 'ok');
      if (s === 'disconnected' || s === 'failed') status('Connection lost. Stop and reshare.', 'err');
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIce(pc);

    await fetch('/offer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pc.localDescription)
    });

    status('Waiting for tablet to connect...', 'wait');
    document.getElementById('streamBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;

    while (pc && !pc.remoteDescription) {
      const res = await fetch('/answer');
      if (res.ok && res.status === 200) {
        await pc.setRemoteDescription(await res.json());
        break;
      }
      await new Promise(r => setTimeout(r, 500));
    }
  } catch (err) {
    status('Error: ' + err.message, 'err');
    console.error(err);
  }
}

async function waitForIce(conn) {
  if (conn.iceGatheringState === 'complete') return;
  return new Promise(resolve => {
    const t = setTimeout(resolve, 5000);
    conn.onicegatheringstatechange = () => {
      if (conn.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
    };
  });
}

function stopAll() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (rawStream) rawStream.getTracks().forEach(t => t.stop());
  if (pc) { pc.close(); pc = null; }
  rawStream = null;
  source.srcObject = null;
  preview.style.display = 'none';
  document.getElementById('captureBtn').disabled = false;
  document.getElementById('streamBtn').disabled = true;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('resetCropBtn').style.display = 'none';
  info('');
  status('Stopped.', '');
  fetch('/reset', { method: 'POST' });
}
</script>
</body>
</html>
